# Port binding
server.port=${PORT:8080}

# Optimization for cold starts on Free tier
spring.main.lazy-initialization=true

# Security API key for incoming requests
app.api-key=${APP_API_KEY:default-dev-key}

# Gemini API configuration
gemini.api.model=${GEMINI_MODEL:gemini-2.0-flash-lite}
gemini.api.fallback-model=${GEMINI_FALLBACK_MODEL:gemini-1.5-flash}
gemini.api.key=${GEMINI_API_KEY:}

# Bubble Data API configuration
bubble.api.base-url=${BUBBLE_API_BASE_URL:https://comforthub.ee/version-test/api/1.1/obj}
bubble.api.token=${BUBBLE_API_TOKEN:default-bubble-token}

# Supabase database config (legacy PostgREST sync — unused after the JPA sync rewrite)
supabase.api.url=${SUPABASE_API_URL:}
supabase.api.key=${SUPABASE_API_KEY:}

# PostgreSQL datasource (direct JDBC — used by Flyway and JPA)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Baseline at V1 so V2 (and later V3) apply on top instead of failing on a non-empty DB.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JPA — let Flyway own the schema; JPA only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Auth0 JWT resource server (single tenant for dev + prod; env overrides per-environment)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://dev-3s4p6zpxj5o3azro.us.auth0.com/}
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0_AUDIENCE:https://api.comforthub.com}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://backoffice.comforthub.ee,https://backoffice-dev.comforthub.ee}

# Actuator & Prometheus metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Sentry Configuration
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:1.0}

# Payments — provider integrations (Montonio + EveryPay)
payments.default-provider=${PAYMENTS_DEFAULT_PROVIDER:montonio}
# Montonio (Stargate API). Sandbox base URL by default.
payments.montonio.base-url=${MONTONIO_BASE_URL:https://sandbox-stargate.montonio.com/api}
payments.montonio.access-key=${MONTONIO_ACCESS_KEY:}
payments.montonio.secret-key=${MONTONIO_SECRET_KEY:}
payments.montonio.enabled-methods=${MONTONIO_ENABLED_METHODS:cardPayments,paymentInitiation}
# EveryPay (APIv4). Demo gateway base URL by default.
payments.everypay.base-url=${EVERYPAY_BASE_URL:https://igw-demo.every-pay.com/api/v4}
payments.everypay.username=${EVERYPAY_API_USERNAME:}
payments.everypay.secret=${EVERYPAY_API_SECRET:}
payments.everypay.account-name=${EVERYPAY_ACCOUNT_NAME:}
payments.everypay.enabled-methods=${EVERYPAY_ENABLED_METHODS:card}
