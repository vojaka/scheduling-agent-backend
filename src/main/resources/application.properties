# Port binding
server.port=${PORT:8080}

# Optimization for cold starts on Free tier
spring.main.lazy-initialization=true

# Security API key for incoming requests
app.api-key=${APP_API_KEY:default-dev-key}

# Gemini API configuration
gemini.api.model=${GEMINI_MODEL:gemini-2.0-flash-lite}
gemini.api.fallback-model=${GEMINI_FALLBACK_MODEL:gemini-1.5-flash}
gemini.api.key=${GEMINI_API_KEY:}

# Bubble Data API configuration
bubble.api.base-url=${BUBBLE_API_BASE_URL:https://comforthub.ee/version-test/api/1.1/obj}
bubble.api.token=${BUBBLE_API_TOKEN:default-bubble-token}

# Supabase database config (for REST API sync)
supabase.api.url=${SUPABASE_API_URL:}
supabase.api.key=${SUPABASE_API_KEY:}

# PostgreSQL datasource (direct JDBC — used by Flyway and JPA)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA — let Flyway own the schema; JPA only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Auth0 JWT — set AUTH0_ISSUER_URI to your tenant, e.g. https://your-tenant.auth0.com/
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://dev-placeholder.auth0.com/}
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0_AUDIENCE:https://api.comforthub.ee}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://backoffice.comforthub.ee}
