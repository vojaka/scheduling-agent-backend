groups:
  - name: comforthub-alerts
    rules:
      - alert: SpringInstanceDown
        expr: up{job="spring-boot-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Spring Boot instance is down"
          description: "The backend service has been down for more than 1 minute."

      - alert: SpringHttpHighErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m])) * 100 > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "HTTP 5xx error rate is above 5% on the Spring Boot backend."

      - alert: SpringSlowRequests
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Slow HTTP requests"
          description: "95% of HTTP requests are taking longer than 2 seconds."
