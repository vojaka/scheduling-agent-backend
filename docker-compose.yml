version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: scheduling-db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: scheduling-postgrest
    restart: always
    ports:
      - "3001:3000"  # Exposed internally/externally for debugging if needed, but not required
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres_dev
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:?set PGRST_JWT_SECRET in .env}
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: .
    container_name: scheduling-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - APP_API_KEY=${APP_API_KEY:?set APP_API_KEY in .env}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-3.1-flash-lite
      - BUBBLE_API_BASE_URL=https://comforthub.ee/version-test/api/1.1/obj
      - BUBBLE_API_TOKEN=${BUBBLE_API_TOKEN:?set BUBBLE_API_TOKEN in .env}
      - SUPABASE_API_URL=http://postgrest:3000
      - SUPABASE_API_KEY=${SUPABASE_API_KEY:-}
      - METABASE_SITE_URL=http://178.105.76.235:3000
      - METABASE_EMBED_SECRET=${METABASE_EMBED_SECRET:?set METABASE_EMBED_SECRET in .env}
      - DB_URL=jdbc:postgresql://db:5432/postgres_dev
      - DB_USERNAME=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      postgrest:
        condition: service_started

  metabase-dev:
    image: metabase/metabase:latest
    container_name: scheduling-metabase-dev
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase_dev
      - MB_DB_PORT=5432
      - MB_DB_USER=postgres
      - MB_DB_PASS=${POSTGRES_PASSWORD}
      - MB_DB_HOST=db
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      db:
        condition: service_healthy

  metabase-live:
    image: metabase/metabase:latest
    container_name: scheduling-metabase-live
    restart: always
    ports:
      - "3002:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase_live
      - MB_DB_PORT=5432
      - MB_DB_USER=postgres
      - MB_DB_PASS=${POSTGRES_PASSWORD}
      - MB_DB_HOST=db
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: scheduling-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus-data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana-oss:latest
    container_name: scheduling-grafana
    restart: always
    ports:
      - "3003:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
