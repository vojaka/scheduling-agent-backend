name: Deploy Backend to Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

#      - name: Run Maven Tests
#        run: mvn clean test

      - name: Backup Current Directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /app/scheduling-agent-backend
            rm -rf /app/scheduling-agent-backend_backup
            cp -r /app/scheduling-agent-backend /app/scheduling-agent-backend_backup

      - name: Copy Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "pom.xml,Dockerfile,docker-compose.yml,init.sql,requirements.txt,sync.py,sync_all.py,run_sync.sh,sync_metabase_live.py,monitor_containers.sh,monitor_ssl.sh,prometheus.yml,alert.rules.yml,grafana/**,src/**,docs/**"
          target: "/app/scheduling-agent-backend"
          rm: false

      - name: Generate .env File on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /app/scheduling-agent-backend
            # Generate the .env file from GitHub Environment secrets.
            # Quoted heredoc delimiter (_EOF_SECRETS_) prevents the remote shell
            # from expanding any $ characters inside secret values. The ${{ secrets.* }}
            # placeholders are substituted by GitHub Actions before this script is sent,
            # so the values never appear in git history or the workflow logs.
            cat << '_EOF_SECRETS_' > .env
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            PGRST_JWT_SECRET=${{ secrets.PGRST_JWT_SECRET }}
            APP_API_KEY=${{ secrets.APP_API_KEY }}
            BUBBLE_API_TOKEN=${{ secrets.BUBBLE_API_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            METABASE_EMBED_SECRET=${{ secrets.METABASE_EMBED_SECRET }}
            SUPABASE_API_KEY=${{ secrets.SUPABASE_API_KEY }}
            DEPLOY_WEBHOOK_URL=${{ secrets.DEPLOY_WEBHOOK_URL }}
            _EOF_SECRETS_
            # Lock down permissions so only the file owner can read or write it.
            chmod 600 .env
            echo ".env file generated and secured with 600 permissions."

      - name: Backup Database on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /app/scheduling-agent-backend
            mkdir -p backups
            if docker ps --format '{{.Names}}' | grep -q "^scheduling-db$"; then
              echo "Creating database backup of all databases (pg_dumpall)..."
              docker compose exec -T db pg_dumpall -U postgres > backups/backup_all_$(date +%F_%H%M%S).sql

              echo "Cleaning up old backups (keeping last 5)..."
              cd backups
              (ls -t backup_all_*.sql 2>/dev/null || true) | tail -n +6 | xargs -I {} rm -- {} || true
            else
              echo "Database container scheduling-db is not running. Skipping backup."
            fi

      - name: Rebuild and Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /app/scheduling-agent-backend
            docker compose build backend
            docker compose up -d
            docker compose ps

      - name: Verify Backend Health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Performing health check smoke test..."
            for i in {1..15}; do
              STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/schedule/sync || true)
              if [ "$STATUS_CODE" = "401" ]; then
                echo "Backend is healthy! Status code: $STATUS_CODE"
                exit 0
              fi
              echo "Backend is not ready yet (status: $STATUS_CODE). Retrying in 3 seconds (Attempt $i/15)..."
              sleep 3
            done
            echo "Backend health check failed!"
            exit 1

      - name: Rollback on Deploy Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Deploy failed. Rolling back to previous version..."
            set -e
            if [ -d /app/scheduling-agent-backend_backup ]; then
              cd /app/scheduling-agent-backend
              docker compose down

              # Restore code directory
              rm -rf /app/scheduling-agent-backend/*
              cp -r /app/scheduling-agent-backend_backup/* /app/scheduling-agent-backend/

              # Start services to boot up database
              docker compose up -d db
              sleep 5

              # Restore database from snapshot
              LATEST_BACKUP=$(ls -t backups/backup_all_*.sql | head -n1)
              if [ -n "$LATEST_BACKUP" ]; then
                echo "Restoring database from $LATEST_BACKUP..."
                docker compose exec -T db psql -U postgres < "$LATEST_BACKUP"
              fi

              # Rebuild and restart services
              docker compose build backend
              docker compose up -d
              docker compose ps
              echo "Rollback successfully completed."
            else
              echo "No backup found to rollback to."
              exit 1
            fi

      - name: Setup Cron Jobs and Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /app/scheduling-agent-backend
            chmod +x run_sync.sh monitor_containers.sh monitor_ssl.sh

            # Setup sync cron
            (crontab -l 2>/dev/null | grep -Fq "run_sync.sh") || ( (crontab -l 2>/dev/null; echo "0 * * * * /bin/bash /app/scheduling-agent-backend/run_sync.sh >> /var/log/bubble_sync.log 2>&1") | crontab - )

            # Setup status monitor cron (runs every 5 mins)
            (crontab -l 2>/dev/null | grep -Fq "monitor_containers.sh") || ( (crontab -l 2>/dev/null; echo "*/5 * * * * /bin/bash /app/scheduling-agent-backend/monitor_containers.sh >> /var/log/container_monitor.log 2>&1") | crontab - )

            # Setup SSL monitor cron (runs every Sunday at midnight)
            (crontab -l 2>/dev/null | grep -Fq "monitor_ssl.sh") || ( (crontab -l 2>/dev/null; echo "0 0 * * 0 /bin/bash /app/scheduling-agent-backend/monitor_ssl.sh >> /var/log/ssl_monitor.log 2>&1") | crontab - )

      - name: Sync Metabase Dashboards (Dev -> Live)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /app/scheduling-agent-backend
            export $(grep -v '^#' .env | xargs)
            python3 sync_metabase_live.py

      - name: Notify Webhook on Success
        if: success()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -n "$DEPLOY_WEBHOOK_URL" ]; then
            PAYLOAD=$(jq -n \
              --arg repo "$REPO" \
              --arg msg "$COMMIT_MSG" \
              --arg actor "$ACTOR" \
              '{content: "🟢 **ComfortHub Backend Deploy SUCCESS**\n- **Repo**: `\($repo)`\n- **Branch**: `main`\n- **Commit**: `\($msg)`\n- **Actor**: `\($actor)`"}')
            curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DEPLOY_WEBHOOK_URL"
          else
            echo "No DEPLOY_WEBHOOK_URL secret found. Skipping notification."
          fi

      - name: Notify Webhook on Failure
        if: failure()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -n "$DEPLOY_WEBHOOK_URL" ]; then
            PAYLOAD=$(jq -n \
              --arg repo "$REPO" \
              --arg msg "$COMMIT_MSG" \
              --arg actor "$ACTOR" \
              '{content: "🔴 **ComfortHub Backend Deploy FAILED & ROLLED BACK**\n- **Repo**: `\($repo)`\n- **Branch**: `main`\n- **Commit**: `\($msg)`\n- **Actor**: `\($actor)`"}')
            curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DEPLOY_WEBHOOK_URL"
          else
            echo "No DEPLOY_WEBHOOK_URL secret found. Skipping notification."
          fi
