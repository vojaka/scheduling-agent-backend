services:
  - type: web
    name: scheduling-agent-backend
    env: docker
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_API_KEY
        sync: false
      - key: BUBBLE_API_TOKEN
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
